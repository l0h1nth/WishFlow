name: Validate and deploy static site

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        run: find js tests -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run dependency-free tests
        run: node --test

      - name: Smoke-test the static site
        run: |
          python3 -m http.server 4173 > /tmp/kindred-http.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
